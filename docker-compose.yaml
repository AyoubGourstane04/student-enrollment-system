version: '3.8'
services:
    student_db:
        image: mysql:8.0
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: student_db
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    course_db:
        image: mysql:8.0
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: course_db
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    enrollement_db:
        image: mysql:8.0
        ports:
            - "3308:3306"
        environment:
            MYSQL_DATABASE: enrollement_db
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
